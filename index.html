<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ScriptSourcing Quiz</title>

<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg, #eaf1f7, #f8fbfd);
  margin: 0;
}

.container {
  max-width: 780px;
  margin: 50px auto;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
}

.logo {
  width: 220px;
  margin-bottom: 20px;
}

h1 {
  color: #1f4e79;
  font-size: 36px;
}

input {
  width: 100%;
  padding: 16px;
  margin-top: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 16px;
  font-size: 18px;
  background: #1f4e79;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.option {
  display: block;
  padding: 14px;
  margin: 10px 0;
  background: #f3f6f9;
  border-radius: 8px;
  cursor: pointer;
  text-align: left;
}

.hidden {
  display: none;
}

.progress {
  text-align: left;
  font-weight: bold;
  margin-bottom: 10px;
}

.timer {
  text-align: left;
  font-size: 14px;
  color: #666;
}
</style>
</head>

<body>
<div class="container">
<div class="card">

<img src="https://drive.google.com/thumbnail?id=1ZEi6UdJvgkoxOTCh83OrOqWesjZsZQrd&sz=w400" class="logo">

<h1>ScriptSourcing Quiz</h1>

<div id="nameScreen">
<input id="firstName" placeholder="First Name">
<input id="lastName" placeholder="Last Name">
<button onclick="startQuiz()">Start Quiz</button>
</div>

<div id="quizScreen" class="hidden">
<div class="progress" id="progress"></div>
<div class="timer" id="timer"></div>
<h2 id="questionText"></h2>
<div id="options"></div>
<button id="nextButton" onclick="nextQuestion()">Next</button>
</div>

<div id="resultScreen" class="hidden">
<h2>Submitted ✅</h2>
<p id="resultText"></p>
</div>

</div>
</div>

<script>
const SCRIPT_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

const questions = [
{q:"What is the primary role of a PBM?",options:["A","B","C","D"],answer:1},
{q:"Who bears risk in self-funded plans?",options:["A","B","C","D"],answer:2}
];

let currentQuestion=0;
let answers=[];
let firstName="";
let lastName="";
let startTime;

function startQuiz(){
firstName=document.getElementById("firstName").value;
lastName=document.getElementById("lastName").value;

if(!firstName||!lastName){alert("Enter name");return;}

document.getElementById("nameScreen").classList.add("hidden");
document.getElementById("quizScreen").classList.remove("hidden");

showQuestion();
}

function showQuestion(){
const q=questions[currentQuestion];

document.getElementById("progress").innerText="Question "+(currentQuestion+1)+" of "+questions.length;
document.getElementById("questionText").innerText=q.q;

document.getElementById("nextButton").innerText=
currentQuestion===questions.length-1?"Submit":"Next";

const optionsDiv=document.getElementById("options");
optionsDiv.innerHTML="";

q.options.forEach((opt,i)=>{
const label=document.createElement("label");
label.className="option";
label.innerHTML=`<input type="radio" name="answer" value="${i}"> ${opt}`;
optionsDiv.appendChild(label);
});

startTime=new Date();
}

function nextQuestion(){
const selected=document.querySelector('input[name="answer"]:checked');
if(!selected){alert("Select answer");return;}

const index=Number(selected.value);
const time=Math.floor((new Date()-startTime)/1000);

answers.push({
questionNumber:currentQuestion+1,
timeSpentSeconds:time,
selectedLetter:["A","B","C","D"][index],
isCorrect:index===questions[currentQuestion].answer
});

currentQuestion++;

if(currentQuestion<questions.length){
showQuestion();
}else{
submitQuiz();
}
}

function submitQuiz(){
const score=answers.filter(a=>a.isCorrect).length;
const totalTime=answers.reduce((s,a)=>s+a.timeSpentSeconds,0);

fetch(SCRIPT_URL,{
method:"POST",
mode:"no-cors",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({
firstName,lastName,score,total:questions.length,totalTimeSeconds:totalTime,answers
})
});

document.getElementById("quizScreen").classList.add("hidden");
document.getElementById("resultScreen").classList.remove("hidden");
document.getElementById("resultText").innerText=
"Thanks "+firstName+"! Score: "+score+"/"+questions.length;
}
</script>

</body>
</html>
