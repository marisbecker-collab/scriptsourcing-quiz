<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ScriptSourcing Quiz</title>

<style>
body {
  font-family: "Segoe UI", Arial;
  background: linear-gradient(135deg, #eaf1f7, #f8fbfd);
  margin: 0;
}

.container {
  max-width: 800px;
  margin: 40px auto;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
}

.logo {
  width: 220px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 16px;
  margin-top: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 16px;
  font-size: 18px;
  background: #1f4e79;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.option {
  display: block;
  padding: 14px;
  margin: 10px 0;
  background: #f3f6f9;
  border-radius: 8px;
  text-align: left;
  cursor: pointer;
}

.hidden { display:none; }

.progress { text-align:left; font-weight:bold; }
.timer { text-align:left; font-size:13px; color:#666; }

</style>
</head>

<body>

<div class="container">
<div class="card">

<img src="https://drive.google.com/thumbnail?id=1ZEi6UdJvgkoxOTCh83OrOqWesjZsZQrd&sz=w400" class="logo">

<h1>ScriptSourcing Quiz</h1>

<div id="nameScreen">
<input id="firstName" placeholder="First Name">
<input id="lastName" placeholder="Last Name">
<button onclick="startQuiz()">Start Quiz</button>
</div>

<div id="quizScreen" class="hidden">
<div class="progress" id="progress"></div>
<div class="timer" id="timer"></div>
<h2 id="questionText"></h2>
<div id="options"></div>
<button id="nextButton" onclick="nextQuestion()">Next</button>
</div>

<div id="resultScreen" class="hidden">
<h2>Submitted ✅</h2>
<p id="resultText"></p>
</div>

</div>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfErxwUbT8awFocSFkemx19yTmRYEarOopBthlQ_ovTYfuRuCSXSLD9ylU5So76Nhw/exec";

const questions = [
{q:"What is the primary role of a PBM?",options:["Manufacture drugs","Administer drug benefits","Underwrite plans","Process claims"],answer:1},
{q:"Who bears risk in self-funded plans?",options:["Carrier","PBM","Employer","Pharmacy"],answer:2},
{q:"Role of TPA?",options:["Admin claims","Stop-loss","Pricing","Manufacturing"],answer:0},
{q:"Stop-loss purpose?",options:["Limit liability","Eliminate cost","Lower premiums","Replace PBM"],answer:0},
{q:"Why voluntary programs?",options:["FDA","PBM","ERISA flexibility","Disruption"],answer:2},
{q:"Why NDC data?",options:["Reconciliation","Eligibility","Wholesale","Remove TPA"],answer:0},
{q:"Pricing formula?",options:["A","(PBM-SS)xPBC+SS","C","D"],answer:1},
{q:"Goal of specialty programs?",options:["Increase","Remove PBM","Shift cost","Reduce spend"],answer:3},
{q:"PBM relationship?",options:["Regulated","None","Manufacture","Network contracts"],answer:3},
{q:"Why specialty focus?",options:["Rare","Generic","Low impact","High cost"],answer:3},
{q:"Rebates impact?",options:["Reduce net","Lower copay","Pay pharmacy","Remove formulary"],answer:0},
{q:"Level vs self funded?",options:["No risk","Fixed","Hybrid","Gov"],answer:2},
{q:"Savings difference?",options:["Same","Immediate","None","Self-funded direct"],answer:3},
{q:"Coalition risk?",options:["Diluted savings","Full retain","No tracking","PBM replaces"],answer:0},
{q:"Stop-loss types?",options:["Wrong","Wrong","Correct protection split","Same"],answer:2}
];

let currentQuestion=0;
let answers=[];
let firstName,lastName,startTime;

function startQuiz(){
firstName=document.getElementById("firstName").value;
lastName=document.getElementById("lastName").value;
if(!firstName||!lastName){alert("Enter name");return;}

document.getElementById("nameScreen").classList.add("hidden");
document.getElementById("quizScreen").classList.remove("hidden");

showQuestion();
}

function showQuestion(){
let q=questions[currentQuestion];

document.getElementById("progress").innerText="Question "+(currentQuestion+1)+" of "+questions.length;
document.getElementById("questionText").innerText=q.q;

document.getElementById("nextButton").innerText=currentQuestion===questions.length-1?"Submit":"Next";

let optionsDiv=document.getElementById("options");
optionsDiv.innerHTML="";

q.options.forEach((opt,i)=>{
optionsDiv.innerHTML+=`<label class="option"><input type="radio" name="a" value="${i}"> ${["A","B","C","D"][i]}. ${opt}</label>`;
});

startTime=new Date();
}

function nextQuestion(){
let selected=document.querySelector('input[name="a"]:checked');
if(!selected){alert("Select answer");return;}

let index=Number(selected.value);
let time=Math.floor((new Date()-startTime)/1000);

answers.push({
questionNumber:currentQuestion+1,
timeSpentSeconds:time,
selectedLetter:["A","B","C","D"][index],
isCorrect:index===questions[currentQuestion].answer
});

currentQuestion++;

if(currentQuestion<questions.length){
showQuestion();
}else{
submitQuiz();
}
}

function submitQuiz(){
let score=answers.filter(a=>a.isCorrect).length;
let totalTime=answers.reduce((s,a)=>s+a.timeSpentSeconds,0);

fetch(SCRIPT_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
firstName,lastName,score,total:questions.length,totalTimeSeconds:totalTime,answers
})
});

document.getElementById("quizScreen").classList.add("hidden");
document.getElementById("resultScreen").classList.remove("hidden");

document.getElementById("resultText").innerText="Score: "+score+"/"+questions.length;
}

</script>

</body>
</html>
